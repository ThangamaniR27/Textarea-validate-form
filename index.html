<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Character Counter</title>

<style>

body{
    font-family: Arial;
    height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #f2f2f2;
}

.container{
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    text-align: center;
}

textarea{
    width: 350px;
    height: 120px;
    padding: 10px;
    font-size: 16px;
}

#counter{
    margin-top: 10px;
}

#warning{
    color: red;
    font-weight: bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Message Box</h2>
<p>200 characters max</p>

<textarea id="message" maxlength="200" placeholder="Type your message..."></textarea>

<p id="counter">0 / 200 characters</p>
<p id="warning"></p>

</div>

<script>

const textarea = document.getElementById("message");
const counter = document.getElementById("counter");
const warning = document.getElementById("warning");

const maxLength = 200;

textarea.addEventListener("input", function(){

    let currentLength = textarea.value.length;

    counter.textContent = currentLength + " / " + maxLength + " characters";

    if(currentLength >= maxLength){
        warning.textContent = "Character limit reached!";
    } else {
        warning.textContent = "";
    }

});

</script>

</body>
</html>
